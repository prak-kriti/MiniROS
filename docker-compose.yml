services:
  backend:
    build:
      context: ./cloud/backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  dashboard:
    build:
      context: ./cloud/dashboard
    ports:
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      - backend

  robot:
    build:
      context: ./robot/ros2_ws
    env_file:
      - .env
    depends_on:
      - backend

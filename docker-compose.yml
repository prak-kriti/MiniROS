services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./cloud/backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      SECRET_KEY: ${SECRET_KEY}
      MONGODB_URI: ${MONGODB_URI}
      DB_NAME: ${DB_NAME}
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED}
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    depends_on:
      - mongodb
    restart: unless-stopped

  dashboard:
    build:
      context: ./cloud/dashboard
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_WS_URL: ${VITE_WS_URL}
    depends_on:
      - backend

  robot:
    build:
      context: ./robot/ros2_ws
    env_file:
      - .env
    environment:
      CLOUD_URL: ${CLOUD_URL}
    depends_on:
      - backend

volumes:
  mongo_data:

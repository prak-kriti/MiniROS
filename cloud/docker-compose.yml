services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  dashboard:
    build:
      context: ./dashboard
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000/ws
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    depends_on:
      - backend

  robot:
    build:
      context: ../robot/ros2_ws
    environment:
      CLOUD_URL: http://backend:8000
    volumes:
      - ../robot/ros2_ws:/ros2_ws
    depends_on:
      - backend
